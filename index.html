<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>LDA Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>LDA Visualizer</h1>
  <div id="model-picker">
    <label class="field-label" for="model-select">Model</label>
    <select id="model-select">
      <option value="wiki_50k_200.json.gz">Wikipedia · 200 topics · 50k articles</option>
      <option value="wiki_50k_100.json.gz">Wikipedia · 100 topics · 50k articles</option>
      <option value="wiki_50k_50.json.gz">Wikipedia · 50 topics · 50k articles</option>
      <option value="wiki_50k_10.json.gz">Wikipedia · 10 topics · 50k articles</option>
      <option value="wiki_100k_100.json.gz" selected>Wikipedia · 100 topics · 100k articles</option>
      <option value="wiki_100k_50.json.gz">Wikipedia · 50 topics · 100k articles</option>
      <option value="wiki_100k_10.json.gz">Wikipedia · 10 topics · 100k articles</option>
    </select>
  </div>
  <div id="model-status">
    <div class="dot"></div>
    <span id="model-status-text">Loading model…</span>
  </div>
</header>

<main>
  <div class="panel-left">
    <label class="field-label" for="input-text">Input text</label>
    <textarea id="input-text" placeholder="Paste any text here…" spellcheck="false"></textarea>
    <div class="btn-row">
      <button id="analyze-btn" disabled>Analyze</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-section">
      <div class="section-title">Topic distribution</div>
      <div id="topic-bars"><p class="empty">Run analysis to see topics.</p></div>
    </div>
    <div class="panel-section scroll">
      <div>
        <div class="section-title">Filter by topic</div>
        <div id="topic-list"><p class="empty">—</p></div>
      </div>
      <div>
        <div class="section-title">Highlighted output</div>
        <div id="output-text"><p class="empty">Words will be coloured by their dominant topic.</p></div>
        <div id="topic-detail">
          <div class="detail-header">
            <div class="detail-dot" id="detail-dot"></div>
            <span class="detail-title" id="detail-title"></span>
            <span class="detail-subtitle" id="detail-subtitle"></span>
          </div>
          <div id="detail-word-bars"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
