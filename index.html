<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>LDA Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>LDA Visualizer</h1>
  <div id="model-picker">
  <label class="field-label">Model</label>
    <button id="model-trigger-btn">
      <span id="model-trigger-text">Wikipedia · 100 topics · 100k articles</span>
      <span class="model-chevron">▼</span>
    </button>
  </div>

  <div id="model-backdrop">
    <div class="mp-modal">
      <div class="mp-modal-title">Select model</div>
      <div class="mp-step-label">Corpus</div>
      <div class="mp-options">
        <button class="mp-option selected" data-corpus="wiki">
          <span>Wiki  </span><span class="mp-opt-sub">Wikipedia </span>
        </button>
        <button class="mp-option" data-corpus="nyt1995">
          <span>NYT 1995</span><span class="mp-opt-sub">NYT articles from 1995</span>
        </button>
        <button class="mp-option" data-corpus="nyt2000">
          <span>NYT 2000</span><span class="mp-opt-sub">NYT articles from 2000</span>
        </button>
        <button class="mp-option" data-corpus="nyt2005">
          <span>NYT 2005</span><span class="mp-opt-sub">NYT articles from 2005</span>
        </button>
      </div>
      <div class="mp-divider"></div>
      <div class="mp-step-label">Number of articles</div>
      <div class="mp-article-grid">
        <button class="mp-article-btn" data-articles="10k">10k</button>
        <button class="mp-article-btn" data-articles="50k">50k</button>
        <button class="mp-article-btn selected" data-articles="100k">100k</button>
      </div>
      <div class="mp-divider"></div>
      <div class="mp-step-label">Number of topics</div>
      <div class="mp-topic-grid">
        <button class="mp-topic-btn" data-topics="10">10</button>
        <button class="mp-topic-btn" data-topics="50">50</button>
        <button class="mp-topic-btn selected" data-topics="100">100</button>
        <button class="mp-topic-btn" data-topics="200" id="topics-200">200</button>
      </div>
      <div class="mp-footer">
        <button id="mp-cancel">Cancel</button>
        <button id="mp-confirm">Load model</button>
      </div>
    </div>
  </div>
  <div id="model-status">
    <div class="dot"></div>
    <span id="model-status-text">Loading model…</span>
  </div>
</header>

<main>
  <div class="panel-left">
    <label class="field-label" for="input-text">Input text</label>
    <textarea id="input-text" placeholder="Paste any text here…" spellcheck="false"></textarea>
    <div class="btn-row">
      <button id="analyze-btn" disabled>Analyze</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-section">
      <div class="section-title">Topic distribution</div>
      <div id="topic-bars"><p class="empty">Run analysis to see topics.</p></div>
    </div>
    <div class="panel-section scroll">
      <div>
        <div class="section-title">Filter by topic</div>
        <div id="topic-list"><p class="empty">—</p></div>
      </div>
      <div>
        <div class="section-title">Highlighted output</div>
        <div id="output-text"><p class="empty">Words will be coloured by their dominant topic.</p></div>
        <div id="topic-detail">
          <div class="detail-header">
            <div class="detail-dot" id="detail-dot"></div>
            <span class="detail-title" id="detail-title"></span>
            <span class="detail-subtitle" id="detail-subtitle"></span>
          </div>
          <div id="detail-word-bars"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
