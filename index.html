<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Lens</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0e0e10;
    --surface: #17171a;
    --border:  rgba(255,255,255,0.07);
    --text:    #e8e6e0;
    --muted:   #6b6966;
    --accent:  #c8b560;
    --mono:    'DM Mono', monospace;
    --serif:   'Fraunces', serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 300;
    font-style: italic;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header span { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  #model-status { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  #model-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  #model-status.ready .dot { background: #5cb87a; }
  #model-status.error .dot { background: #e05c5c; }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 73px);
  }
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 36px;
    gap: 20px;
  }
  .field-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.75;
    padding: 18px 20px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(200,181,96,0.4); }
  textarea::placeholder { color: var(--muted); }
  .btn-row { display: flex; gap: 10px; align-items: center; }
  button#analyze-btn {
    background: var(--accent);
    color: #0e0e10;
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  button#analyze-btn:hover  { opacity: 0.85; }
  button#analyze-btn:active { transform: scale(0.98); }
  button#analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 12px; color: var(--muted); font-style: italic; }

  .panel-right { display: flex; flex-direction: column; overflow: hidden; }
  .panel-section { padding: 28px 36px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-section.scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; border-bottom: none; }
  .section-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

  .topic-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; opacity: 0; animation: fadeUp 0.3s forwards; }
  .bar-label { width: 120px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 3px; transform: scaleX(0); transform-origin: left; }
  .bar-pct   { width: 42px; text-align: right; font-size: 11px; color: var(--muted); flex-shrink: 0; }

  #topic-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .topic-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 8px;
    border-radius: 999px; border: 1px solid;
    font-size: 12px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    opacity: 0; animation: fadeUp 0.3s forwards;
  }
  .topic-chip:hover { transform: translateY(-1px); }
  .topic-chip.dimmed { opacity: 0.2 !important; }
  .chip-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chip-label { font-weight: 500; }
  .chip-weight { font-size: 11px; opacity: 0.7; }

  #output-text { font-family: var(--mono); font-size: 14px; line-height: 2.2; }
  .word { display: inline; padding: 1px 0; transition: opacity 0.2s; cursor: default; }
  .word.has-topic { padding: 2px 5px; margin: 0 1px; border-radius: 4px; }
  .word.dimmed { opacity: 0.1; }
  .word.oop    { color: var(--muted); }

  .empty { color: var(--muted); font-style: italic; font-size: 13px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>Topic Lens</h1>
  <span>LDA Visualizer</span>
  <div id="model-status">
    <div class="dot"></div>
    <span id="model-status-text">Loading model…</span>
  </div>
</header>

<main>
  <div class="panel-left">
    <label class="field-label" for="input-text">Input text</label>
    <textarea id="input-text" placeholder="Paste any text here…" spellcheck="false"></textarea>
    <div class="btn-row">
      <button id="analyze-btn" disabled>Analyze</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-section">
      <div class="section-title">Topic distribution</div>
      <div id="topic-bars"><p class="empty">Run analysis to see topics.</p></div>
    </div>
    <div class="panel-section scroll">
      <div>
        <div class="section-title">Filter by topic</div>
        <div id="topic-list"><p class="empty">—</p></div>
      </div>
      <div>
        <div class="section-title">Highlighted output</div>
        <div id="output-text"><p class="empty">Words will be coloured by their dominant topic.</p></div>
      </div>
    </div>
  </div>
</main>

<script>
// ── palette ──────────────────────────────────────────────────────────────────
const COLORS = [
  "210,78%,62%","25,84%,58%","152,58%,46%","278,62%,63%","338,68%,59%",
  "52,88%,52%","192,68%,49%","12,74%,56%","124,53%,46%","262,58%,66%",
  "36,78%,54%","172,63%,45%","302,53%,59%","82,63%,47%","222,68%,56%",
  "2,68%,56%","144,58%,49%","312,58%,61%","62,84%,49%","202,73%,53%",
];

// Edit to match your trained model — keyed by topic index
const TOPIC_LABELS = {};
// e.g. const TOPIC_LABELS = { 0:"Military", 3:"Football", 10:"Olympics" };

// ── digamma (Stirling series, accurate to ~1e-10 for x>0) ───────────────────
function digamma(x) {
  let r = 0;
  while (x < 6) { r -= 1 / x; x++; }
  r += Math.log(x) - 0.5/x - 1/(12*x*x) + 1/(120*x*x*x*x) - 1/(252*x*x*x*x*x*x);
  return r;
}

// ── stopwords ────────────────────────────────────────────────────────────────
const STOPWORDS = new Set([
  "i","me","my","myself","we","our","ours","ourselves","you","your","yours",
  "yourself","yourselves","he","him","his","himself","she","her","hers",
  "herself","it","its","itself","they","them","their","theirs","themselves",
  "what","which","who","whom","this","that","these","those","am","is","are",
  "was","were","be","been","being","have","has","had","having","do","does",
  "did","doing","a","an","the","and","but","if","or","because","as","until",
  "while","of","at","by","for","with","about","against","between","into",
  "through","during","before","after","above","below","to","from","up","down",
  "in","out","on","off","over","under","again","further","then","once","here",
  "there","when","where","why","how","all","both","each","few","more","most",
  "other","some","such","no","nor","not","only","own","same","so","than",
  "too","very","s","t","can","will","just","don","should","now","d","ll",
  "m","o","re","ve","y","ain","aren","couldn","didn","doesn","hadn","hasn",
  "haven","isn","ma","mightn","mustn","needn","shan","shouldn","wasn","weren",
  "won","wouldn","also","one","two","three","four","five","first","second",
  "third","last","next","new","old","many","much","well","often","would",
  "could","may","might","must","shall","said","known","used","made","became",
  "include","including","however","although","since","later","early","large",
  "small","different","another","several","various","number","part","set",
  "use","uses","using","de","b","see","references","held",
]);

// ── tokenizer ────────────────────────────────────────────────────────────────
function tokenize(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z\s]/g, " ")
    .split(/\s+/)
    .filter(t => t.length > 2 && !STOPWORDS.has(t));
}

// ── variational inference ────────────────────────────────────────────────────
function infer(uniqueIds, counts, beta, alpha, maxIter = 100, tol = 1e-3) {
  const k       = alpha.length;
  const nUnique = uniqueIds.length;

  // warm-start phi from log_beta
  const phi = uniqueIds.map(wid => {
    const row = new Float64Array(k);
    let mx = -Infinity;
    for (let j = 0; j < k; j++) {
      row[j] = Math.log((beta[j][wid] || 0) + 1e-12);
      if (row[j] > mx) mx = row[j];
    }
    let s = 0;
    for (let j = 0; j < k; j++) { row[j] = Math.exp(row[j] - mx); s += row[j]; }
    for (let j = 0; j < k; j++) row[j] /= s;
    return row;
  });

  const gamma = new Float64Array(k);
  for (let j = 0; j < k; j++) {
    gamma[j] = alpha[j];
    for (let n = 0; n < nUnique; n++) gamma[j] += phi[n][j] * counts[n];
  }

  for (let iter = 0; iter < maxIter; iter++) {
    const gammaOld = gamma.slice();
    const dgSum    = digamma(gamma.reduce((a, b) => a + b, 0));
    const logTheta = Array.from(gamma, g => digamma(g) - dgSum);

    for (let n = 0; n < nUnique; n++) {
      const wid = uniqueIds[n];
      let mx = -Infinity, s = 0;
      for (let j = 0; j < k; j++) {
        phi[n][j] = Math.log((beta[j][wid] || 0) + 1e-12) + logTheta[j];
        if (phi[n][j] > mx) mx = phi[n][j];
      }
      for (let j = 0; j < k; j++) { phi[n][j] = Math.exp(phi[n][j] - mx); s += phi[n][j]; }
      for (let j = 0; j < k; j++) phi[n][j] /= s;
    }

    for (let j = 0; j < k; j++) {
      gamma[j] = alpha[j];
      for (let n = 0; n < nUnique; n++) gamma[j] += phi[n][j] * counts[n];
    }

    let delta = 0;
    for (let j = 0; j < k; j++) delta += Math.abs(gamma[j] - gammaOld[j]);
    if (delta / k < tol) break;
  }

  return gamma;
}

// ── model ────────────────────────────────────────────────────────────────────
let MODEL = null;

async function loadModel() {
  const statusWrap = document.getElementById("model-status");
  const statusTxt  = document.getElementById("model-status-text");
  try {
    const res = await fetch("model.json.gz");
    if (!res.ok) throw new Error(res.statusText);

    const decompressed = res.body.pipeThrough(new DecompressionStream("gzip"));
    const text = await new Response(decompressed).text();
    const data = JSON.parse(text);
    MODEL = {
      alpha:    data.alpha,
      beta:     data.beta,
      vocab:    data.vocab,
      wordToId: Object.fromEntries(data.vocab.map((w, i) => [w, i])),
    };
    statusWrap.className = "ready";
    statusTxt.textContent = `${MODEL.beta.length} topics · ${MODEL.vocab.length.toLocaleString()} words`;
    document.getElementById("analyze-btn").disabled = false;
  } catch (e) {
    statusWrap.className = "error";
    statusTxt.textContent = "model.json not found";
    console.error(e);
  }
}

// ── run analysis ─────────────────────────────────────────────────────────────
function runAnalysis(text) {
  const tokens = tokenize(text);
  const docIds = tokens.map(t => MODEL.wordToId[t]).filter(id => id !== undefined);
  if (!docIds.length) return null;

  const countMap = {};
  for (const id of docIds) countMap[id] = (countMap[id] || 0) + 1;
  const uniqueIds = Object.keys(countMap).map(Number);
  const counts    = uniqueIds.map(id => countMap[id]);

  const gamma    = infer(uniqueIds, counts, MODEL.beta, MODEL.alpha);
  const gammaSum = gamma.reduce((a, b) => a + b, 0);
  const theta    = Array.from(gamma, g => g / gammaSum);
  const evidence = Array.from(gamma, (g, j) => g - MODEL.alpha[j]);

  const pTopics = evidence
    .map((e, i) => ({ id: i, evidence: e, weight: theta[i] }))
    .filter(t => t.evidence >= 0.05)
    .sort((a, b) => b.evidence - a.evidence)
    .map(t => ({
      ...t,
      label:    TOPIC_LABELS[t.id] ?? `Topic ${t.id}`,
      color:    COLORS[t.id % COLORS.length],
      topWords: MODEL.beta[t.id]
        .map((v, i) => [v, i])
        .sort((a, b) => b[0] - a[0])
        .slice(0, 8)
        .map(([, i]) => MODEL.vocab[i]),
    }));

  const sorted = pTopics.sort((a, b) => b.weight - a.weight);
  const gaps = sorted.slice(1).map((t, i) => sorted[i].weight - t.weight);
  const elbowIdx = Math.max(gaps.indexOf(Math.max(...gaps)), 4);
  const topics = sorted.slice(0, elbowIdx + 1);

  if (!topics.length) return null;
  const activeIds = topics.map(t => t.id);

  const digamma = x => Math.log(Math.max(x - 0.5, 1e-10));
  const logGammaByTopic = Object.fromEntries(
    activeIds.map(tid => [tid, digamma(gamma[tid])])
  );

  const words = text.split(/\s+/).map(token => {
    const wid = MODEL.wordToId[token.toLowerCase().replace(/[^a-z\s']/g, "")];
    if (wid === undefined) return { text: token, topic: null, color: null };

    // Compute unnormalized log-scores, then softmax over active topics only
    const logScores = activeIds.map(tid =>
      logGammaByTopic[tid] + Math.log(MODEL.beta[tid][wid] || 1e-10)
    );
    const maxLog = Math.max(...logScores);
    const expScores = logScores.map(s => Math.exp(s - maxLog)); // numerical stability
    const expSum    = expScores.reduce((a, b) => a + b, 0);
    const qScores   = expScores.map(s => s / expSum);           // q_n(z_n = topic)

    const bestIdx   = qScores.indexOf(Math.max(...qScores));
    const bestQ     = qScores[bestIdx];
    const bestTopic = activeIds[bestIdx];

    // Only colour the word if the posterior is confident enough
    if (bestQ <= 0.5) return { text: token, topic: null, color: null };
    return { text: token, topic: bestTopic, color: COLORS[bestTopic % COLORS.length] };
  });

  return { topics, words };
}

// ── render helpers ────────────────────────────────────────────────────────────
let activeFilter = null;
let lastWords    = [];

function renderBars(topics) {
  const el  = document.getElementById("topic-bars");
  el.innerHTML = "";
  const max = Math.max(...topics.map(t => t.weight));
  topics.forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "topic-bar-row";
    row.style.animationDelay = `${i * 40}ms`;
    row.title = "Top words: " + t.topWords.join(", ");
    row.innerHTML = `
      <div class="bar-label">${t.label}</div>
      <div class="bar-track"><div class="bar-fill" style="background:hsl(${t.color})"></div></div>
      <div class="bar-pct">${(t.weight * 100).toFixed(1)}%</div>`;
    el.appendChild(row);
    // trigger after paint so transition fires
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const fill = row.querySelector(".bar-fill");
      fill.style.transition = `transform 0.55s cubic-bezier(0.22,1,0.36,1) ${i * 50}ms`;
      fill.style.transform  = `scaleX(${t.weight / max})`;
    }));
  });
}

function renderChips(topics) {
  const el = document.getElementById("topic-list");
  el.innerHTML = "";
  topics.forEach((t, i) => {
    const chip = document.createElement("div");
    chip.className = "topic-chip";
    chip.style.cssText = `animation-delay:${i * 35}ms;border-color:hsla(${t.color},0.4);background:hsla(${t.color},0.08)`;
    chip.dataset.id = t.id;
    chip.title = t.topWords.join(", ");
    chip.innerHTML = `
      <div class="chip-dot" style="background:hsl(${t.color})"></div>
      <span class="chip-label">${t.label}</span>
      <span class="chip-weight">${(t.weight * 100).toFixed(1)}%</span>`;
    chip.addEventListener("click", () => {
      activeFilter = activeFilter === t.id ? null : t.id;
      document.querySelectorAll(".topic-chip").forEach(c =>
        c.classList.toggle("dimmed", activeFilter !== null && parseInt(c.dataset.id) !== activeFilter)
      );
      renderWords(lastWords, activeFilter);
    });
    el.appendChild(chip);
  });
}

function renderWords(words, filter) {
  const el = document.getElementById("output-text");
  el.innerHTML = "";
  words.forEach(w => {
    const span = document.createElement("span");
    span.textContent = w.text + " ";
    if (w.topic === null) {
      span.className = "word oop";
    } else {
      const dim = filter !== null && w.topic !== filter;
      span.className = `word has-topic${dim ? " dimmed" : ""}`;
      span.style.background = `hsla(${w.color},${dim ? 0 : 0.22})`;
      span.style.color      = dim ? "" : `hsl(${w.color})`;
      span.title = TOPIC_LABELS[w.topic] ?? `Topic ${w.topic}`;
    }
    el.appendChild(span);
  });
}

// ── analyze button ────────────────────────────────────────────────────────────
document.getElementById("analyze-btn").addEventListener("click", () => {
  const text = document.getElementById("input-text").value.trim();
  if (!text || !MODEL) return;

  const btn    = document.getElementById("analyze-btn");
  const status = document.getElementById("status");
  btn.disabled = true;
  activeFilter = null;
  status.innerHTML = '<span class="spinner"></span>';

  setTimeout(() => {
    const t0     = performance.now();
    const result = runAnalysis(text);
    const ms     = (performance.now() - t0).toFixed(0);

    if (!result) {
      status.textContent = "No known vocabulary found.";
      btn.disabled = false;
      return;
    }
    lastWords = result.words;
    renderBars(result.topics);
    renderChips(result.topics);
    renderWords(result.words, null);
    status.textContent = `${result.topics.length} topics · ${result.words.length} tokens · ${ms}ms`;
    btn.disabled = false;
  }, 30);
});

// ── boot ──────────────────────────────────────────────────────────────────────
loadModel();

document.getElementById("input-text").value =
  "The William Randolph Hearst Foundation will give $1.25 million to Lincoln Center, Metropoli-" +
  "tan Opera Co., New York Philharmonic and Juilliard School. “Our board felt that we had a" +
  "real opportunity to make a mark on the future of the performing arts with these grants an act" +
  "every bit as important as our traditional areas of support in health, medical research, education" +
  "and the social services,” Hearst Foundation President Randolph A. Hearst said Monday in" +
  "announcing the grants. Lincoln Center’s share will be $200,000 for its new building, which" +
  "will house young artists and provide new public facilities. The Metropolitan Opera Co. and" +
  "New York Philharmonic will receive $400,000 each. The Juilliard School, where music and" +
  "the performing arts are taught, will get $250,000. The Hearst Foundation, a leading supporter" +
  "of the Lincoln Center Consolidated Corporate Fund, will make its usual annual $100,000 donation, too.";
</script>
</body>
</html>
